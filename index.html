<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>0xb0rn3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --black:#000; --bg:#0a0908;
            --fg:#ebdbb2; --fg-muted:#a89984; --fg-dim:#665c54; --white:#fbf1c7;
            --yellow:#fabd2f; --orange:#fe8019; --aqua:#8ec07c;
            --red:#fb4934; --blue:#83a598; --purple:#d3869b;
            --border:rgba(235,219,178,.10);
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{height:100%;overflow:hidden}
        body{
            background:var(--black);color:var(--fg);
            font-family:'JetBrains Mono',monospace;
            display:flex;align-items:center;justify-content:center;
            cursor:crosshair;
        }
        body::before{
            content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.025;
            background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size:200px;
        }
        #rain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.04}
        .scanline{
            position:fixed;inset:0;z-index:2;pointer-events:none;
            background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);
        }
        .progress{
            position:fixed;top:0;left:0;height:2px;width:0%;z-index:100;
            background:linear-gradient(90deg,var(--yellow),var(--orange),var(--red));
            box-shadow:0 0 10px rgba(250,189,47,.4);transition:width .2s ease;
        }
        .progress.done{background:var(--aqua);box-shadow:0 0 10px rgba(142,192,124,.4)}
        .hud{
            position:relative;z-index:10;width:min(680px,94vw);
            display:flex;flex-direction:column;gap:clamp(10px,2vh,16px);
        }
        .brand{text-align:center;animation:fadeUp .6s ease .1s both}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        .logo{
            font-family:'Orbitron',monospace;font-weight:900;
            font-size:clamp(2.4rem,9vw,4.5rem);
            color:var(--white);letter-spacing:clamp(2px,1vw,8px);line-height:1;display:inline-block;position:relative;
        }
        .logo .accent{color:var(--yellow)}
        .logo::before,.logo::after{content:'0xb0rn3';position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
        .logo::before{color:var(--red);opacity:0;clip-path:polygon(0 15%,100% 15%,100% 35%,0 35%);animation:glA 7s infinite}
        .logo::after{color:var(--aqua);opacity:0;clip-path:polygon(0 60%,100% 60%,100% 80%,0 80%);animation:glB 7s infinite}
        @keyframes glA{0%,93%,100%{transform:translateX(0);opacity:0}94%{transform:translateX(-3px);opacity:.7}96%{transform:translateX(2px);opacity:.3}}
        @keyframes glB{0%,90%,100%{transform:translateX(0);opacity:0}91%{transform:translateX(3px);opacity:.6}93%{transform:translateX(-2px);opacity:.2}}
        .subtitle{font-size:clamp(.5rem,1.3vw,.65rem);color:var(--fg-dim);text-transform:uppercase;letter-spacing:3px;margin-top:6px}
        .intel-strip{
            display:flex;flex-wrap:wrap;gap:1px;background:rgba(20,18,16,.6);
            border:1px solid var(--border);border-radius:8px;overflow:hidden;animation:fadeUp .6s ease .3s both;
        }
        .intel-cell{
            flex:1 1 0;min-width:90px;padding:clamp(6px,1.2vh,10px) clamp(8px,1.5vw,14px);
            border-right:1px solid var(--border);background:rgba(10,9,8,.5);
        }
        .intel-cell:last-child{border-right:none}
        .intel-label{font-size:clamp(.42rem,.9vw,.48rem);color:var(--fg-dim);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-bottom:2px}
        .intel-val{font-size:clamp(.58rem,1.4vw,.7rem);color:var(--fg);font-weight:500;min-height:1.1em}
        .intel-val .scanning{display:inline-block;width:40px;height:2px;background:var(--yellow);border-radius:2px;animation:pulse 1s ease-in-out infinite;vertical-align:middle}
        @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
        .term{
            background:rgba(10,9,8,.7);border:1px solid var(--border);border-radius:10px;overflow:hidden;
            animation:fadeUp .6s ease .5s both;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
        }
        .term-bar{display:flex;align-items:center;gap:6px;padding:.45rem .75rem;background:rgba(40,40,40,.4);border-bottom:1px solid var(--border)}
        .dot{width:8px;height:8px;border-radius:50%}
        .dot.r{background:var(--red)}.dot.y{background:var(--yellow)}.dot.g{background:var(--aqua)}
        .bar-title{flex:1;text-align:center;font-size:clamp(.46rem,1vw,.54rem);color:var(--fg-dim);letter-spacing:1px;text-transform:uppercase}
        .bar-status{font-size:clamp(.44rem,.9vw,.5rem);font-weight:700;letter-spacing:1px}
        .status-ready{color:var(--fg-dim)}
        .status-running{color:var(--yellow);animation:pulse 1.5s ease-in-out infinite}
        .status-granted{color:var(--aqua)}
        .term-body{
            padding:clamp(8px,1.5vh,14px) clamp(10px,2vw,16px);
            max-height:clamp(180px,35vh,320px);overflow-y:auto;
            font-size:clamp(.58rem,1.3vw,.68rem);line-height:1.8;
        }
        .term-body::-webkit-scrollbar{width:3px}
        .term-body::-webkit-scrollbar-thumb{background:var(--fg-dim);border-radius:9px}
        .log-line{opacity:0;transform:translateX(-6px);transition:all .2s ease}
        .log-line.show{opacity:1;transform:translateX(0)}
        .prompt-prefix{color:var(--yellow);font-weight:700}
        .log-cmd{color:var(--fg)}.log-out{color:var(--fg-dim)}
        .log-warn{color:var(--orange);font-weight:600}
        .log-crit{color:var(--red);font-weight:700}
        .log-flag{color:var(--aqua);font-weight:700}
        .manual-wrap{display:none;margin-top:6px}
        .manual-wrap.show{display:block}
        .term-line{display:flex;align-items:center;gap:4px;flex-wrap:nowrap}
        .p-user{color:var(--yellow);font-weight:700;font-size:.7rem}
        .p-dim{color:var(--fg-dim);font-size:.7rem}
        .term-input{
            flex:1;background:transparent;border:none;outline:none;
            color:var(--fg);font-family:inherit;font-size:clamp(.6rem,1.3vw,.7rem);
            caret-color:var(--yellow);min-width:0;
        }
        .term-error{margin-top:4px;font-size:.6rem;display:none;padding:4px 8px;border-radius:6px;color:var(--red);background:rgba(251,73,52,.06);border:1px solid rgba(251,73,52,.15)}
        .term-error.show{display:block;animation:shake .25s ease}
        @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
        .skip{
            position:fixed;bottom:clamp(10px,2vw,16px);right:clamp(10px,2vw,16px);z-index:100;
            display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:999px;
            background:rgba(20,18,16,.6);border:1px solid var(--border);color:var(--fg-dim);
            font-family:inherit;font-size:clamp(.48rem,1.1vw,.55rem);font-weight:600;
            text-transform:uppercase;letter-spacing:1px;cursor:pointer;opacity:0;transition:all .3s ease;
        }
        .skip.show{opacity:1}
        .skip:hover{background:var(--yellow);color:var(--black);border-color:var(--yellow)}
        .skip i{font-size:.5rem}
        .flash{position:fixed;inset:0;z-index:150;pointer-events:none;opacity:0;border:2px solid var(--aqua);background:rgba(142,192,124,.03)}
        .flash.fire{animation:flashP .5s ease-out}
        @keyframes flashP{0%{opacity:1}100%{opacity:0}}
        .brand,.intel-strip{transition:filter .5s ease,opacity .5s ease}
        body.breach .brand{filter:blur(6px) brightness(.4);opacity:.3}
        body.breach .intel-strip{filter:blur(4px) brightness(.5);opacity:.4}
        body.breach .term{border-color:rgba(250,189,47,.25);box-shadow:0 0 40px rgba(250,189,47,.06)}
        .fade-out{animation:pageOut .5s ease forwards}
        @keyframes pageOut{to{opacity:0}}
        @media(max-width:500px){.intel-cell{min-width:45%;flex:1 1 45%}.term-body{max-height:200px}}
        .ripple{position:fixed;z-index:99;border-radius:50%;border:1px solid var(--aqua);pointer-events:none;animation:rip .4s ease forwards}
        @keyframes rip{0%{width:0;height:0;opacity:.5}100%{width:50px;height:50px;opacity:0}}
    </style>
</head>
<body>
<canvas id="rain"></canvas>
<div class="scanline"></div>
<div class="progress" id="prog"></div>
<div class="flash" id="flash"></div>
<div class="hud">
    <div class="brand">
        <h1 class="logo"><span class="accent">0x</span>b0rn3</h1>
        <p class="subtitle">security researcher · ethical hacker · exploit developer</p>
    </div>
    <div class="intel-strip">
        <div class="intel-cell"><div class="intel-label">IP</div><div class="intel-val" id="vIP"><span class="scanning"></span></div></div>
        <div class="intel-cell"><div class="intel-label">Location</div><div class="intel-val" id="vLoc"><span class="scanning"></span></div></div>
        <div class="intel-cell"><div class="intel-label">Device</div><div class="intel-val" id="vDev"><span class="scanning"></span></div></div>
        <div class="intel-cell"><div class="intel-label">OS</div><div class="intel-val" id="vOS"><span class="scanning"></span></div></div>
        <div class="intel-cell"><div class="intel-label">ISP</div><div class="intel-val" id="vISP"><span class="scanning"></span></div></div>
    </div>
    <div class="term">
        <div class="term-bar">
            <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
            <span class="bar-title" id="barTitle">STANDBY</span>
            <span class="bar-status status-ready" id="barStatus">● READY</span>
        </div>
        <div class="term-body" id="termBody">
            <div id="log"></div>
            <div class="manual-wrap" id="manualWrap">
                <div class="term-line">
                    <span class="p-user">visitor@0xb0rn3</span><span class="p-dim">:~$</span>
                    <input type="text" class="term-input" id="termInput" autocomplete="off" spellcheck="false" placeholder="type command..." aria-label="Command">
                </div>
                <div class="term-error" id="termError"></div>
            </div>
        </div>
    </div>
</div>
<button class="skip" id="skip"><i class="fas fa-forward"></i> Skip</button>
<script>
'use strict';
const DEST='main.html',KEY='setuid(0); execve("/bin/sh", NULL, NULL);';
const ERRORS=['permission denied','invalid credentials','command not found','segfault at 0x0','EACCES','try harder'];
let auto=true,done=false,ipData=null;
const $=id=>document.getElementById(id),log=$('log'),prog=$('prog'),flash=$('flash'),skip=$('skip'),termInput=$('termInput');
const wait=ms=>new Promise(r=>setTimeout(r,ms));

/* Matrix Rain */
(()=>{const c=$('rain'),ctx=c.getContext('2d');let cols,drops;const ch='0123456789ABCDEFabcdef{}[]<>|';function resize(){c.width=innerWidth;c.height=innerHeight;cols=Math.floor(c.width/13);drops=Array(cols).fill(1)}resize();addEventListener('resize',resize);setInterval(()=>{ctx.fillStyle='rgba(0,0,0,.06)';ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle='#fabd2f';ctx.font='13px JetBrains Mono,monospace';for(let i=0;i<cols;i++){ctx.fillText(ch[Math.floor(Math.random()*ch.length)],i*13,drops[i]*13);if(drops[i]*13>c.height&&Math.random()>.975)drops[i]=0;drops[i]++}},66)})();

/* Click Ripple */
addEventListener('click',e=>{const r=document.createElement('div');r.className='ripple';r.style.left=(e.clientX-25)+'px';r.style.top=(e.clientY-25)+'px';document.body.appendChild(r);r.onanimationend=()=>r.remove()});

/* Helpers */
const addLine=h=>{const d=document.createElement('div');d.className='log-line';d.innerHTML=h;log.appendChild(d);requestAnimationFrame(()=>d.classList.add('show'));$('termBody').scrollTop=$('termBody').scrollHeight};
const setProg=p=>{prog.style.width=p+'%'};
const setBar=(t,s,c)=>{$('barTitle').textContent=t;$('barStatus').textContent=s;$('barStatus').className='bar-status '+c};
const go=async ms=>{await wait(ms);return auto};
const P=t=>`<span class="prompt-prefix">0xb0rn3$</span> <span class="log-cmd">${t}</span>`;
const O=t=>`<span class="log-out">${t}</span>`;
const W=t=>`<span class="log-warn">${t}</span>`;
const C=t=>`<span class="log-crit">${t}</span>`;
const F=t=>`<span class="log-flag">${t}</span>`;
const typeVal=(el,text)=>new Promise(resolve=>{el.textContent='';let i=0;const t=setInterval(()=>{el.textContent+=text[i++];if(i>=text.length){clearInterval(t);resolve()}},18)});

/* Device */
const ua=navigator.userAgent;
const getDevice=()=>{if(/iPhone/i.test(ua))return'iPhone';if(/iPad/i.test(ua))return'iPad';if(/Android/i.test(ua)&&/mobile/i.test(ua))return'Android';if(/Android/i.test(ua))return'Android Tablet';return'Desktop'};
const getOS=()=>{if(/Windows/i.test(ua))return'Windows';if(/Mac OS X/i.test(ua))return'macOS';if(/Android/i.test(ua))return'Android';if(/iPhone|iPad|iPod/i.test(ua))return'iOS';if(/Linux/i.test(ua))return'Linux';return'Unknown'};

/* Intel */
const fetchIntel=async()=>{await typeVal($('vDev'),getDevice());await typeVal($('vOS'),getOS());try{const res=await fetch('https://ipapi.co/json/');ipData=await res.json();await typeVal($('vIP'),ipData.ip||'—');await typeVal($('vLoc'),[ipData.city,ipData.country_name].filter(Boolean).join(', ')||'—');const isp=ipData.org||'—';await typeVal($('vISP'),isp.length>30?isp.slice(0,30)+'…':isp)}catch{$('vIP').textContent=$('vLoc').textContent=$('vISP').textContent='—'}};

/* Grant */
const grant=()=>{done=true;flash.classList.add('fire');prog.classList.add('done');setProg(100);setBar('ACCESS GRANTED','● ROOT','status-granted');setTimeout(()=>{document.body.classList.add('fade-out');setTimeout(()=>{location.href=DEST},400)},300)};

/* ═══ OS CHAINS ═══ */
async function ios(ip,dev){
    setBar('EXPLOIT','● CHECKM8','status-running');setProg(15);
    addLine(W('[!] A11 SoC — bootrom vulnerable'));if(!await go(200))return;
    addLine(P('checkra1n -cv'));if(!await go(200))return;
    addLine(O('[*] DFU → bootrom exploit → iBoot patched'));setProg(40);if(!await go(200))return;
    addLine(C('[+] tfp0 acquired'));setProg(60);if(!await go(150))return;
    setBar('POST','● JAILBROKEN','status-running');
    addLine(C(`[+] Keychain: ${3+Math.floor(Math.random()*8)} creds`));setProg(85);if(!await go(150))return;
    addLine(F(`▶ ${dev} JAILBROKEN · checkm8 → tfp0 → keychain`));setProg(99);if(!await go(200))return;
}
async function mac(ip){
    setBar('EXPLOIT','● SIP BYPASS','status-running');setProg(15);
    addLine(W('[!] CVE-2024-44243 — SIP bypass'));if(!await go(200))return;
    addLine(O('[*] StorageKit TCC bypass → unsigned kext'));setProg(40);if(!await go(200))return;
    addLine(C('[+] SIP disabled · root'));setProg(60);if(!await go(150))return;
    setBar('POST','● ROOT','status-running');
    addLine(C(`[+] System keychain: ${5+Math.floor(Math.random()*12)} secrets`));setProg(85);if(!await go(150))return;
    addLine(F('▶ macOS OWNED · CVE-2024-44243 → root → keychain'));setProg(99);if(!await go(200))return;
}
async function android(ip,dev){
    setBar('EXPLOIT','● KERNEL','status-running');setProg(15);
    addLine(W('[!] CVE-2024-53104 — USB Video OOB'));if(!await go(200))return;
    addLine(O('[*] Heap overflow → kernel R/W → SELinux off'));setProg(40);if(!await go(200))return;
    addLine(C('[+] uid=0(root)'));setProg(60);if(!await go(150))return;
    setBar('POST','● ROOTED','status-running');
    addLine(C(`[+] WiFi creds + IMEI captured`));setProg(85);if(!await go(150))return;
    addLine(F(`▶ ${dev} ROOTED · CVE-2024-53104 → kernel → Magisk`));setProg(99);if(!await go(200))return;
}
async function win(ip){
    setBar('EXPLOIT','● PRINTNIGHTMARE','status-running');setProg(15);
    addLine(W('[!] CVE-2021-34527 — Print Spooler RCE'));if(!await go(200))return;
    addLine(C('[+] DLL loaded → NT AUTHORITY\\SYSTEM'));setProg(35);if(!await go(200))return;
    setBar('CREDS','● MIMIKATZ','status-running');
    addLine(C('[+] NTLM + krbtgt hashes'));setProg(55);if(!await go(200))return;
    addLine(C('[+] Domain Admin'));setProg(80);if(!await go(150))return;
    addLine(F('▶ DOMAIN ADMIN · PrintNightmare → mimikatz → DA'));setProg(99);if(!await go(200))return;
}
async function linux(ip){
    const sh='rev'+Math.floor(Math.random()*99)+'.php';
    setBar('EXPLOIT','● WEBSHELL','status-running');setProg(15);
    addLine(P(`curl -X POST ${ip}/uploads/ -F "file=@${sh}"`));if(!await go(200))return;
    addLine(C('[+] Shell uploaded → reverse callback'));setProg(35);if(!await go(200))return;
    setBar('PRIVESC','● CVE-2025-32463','status-running');
    addLine(W('[!] sudo 1.9.15p5 — NSS injection'));if(!await go(200))return;
    addLine(C('[+] uid=0(root)'));setProg(65);if(!await go(150))return;
    setBar('POST','● EXFIL','status-running');
    addLine(O('[*] shadow + ssh keys exfiltrated'));setProg(85);if(!await go(150))return;
    addLine(F('▶ ROOT · webshell → CVE-2025-32463 → exfil'));setProg(99);if(!await go(200))return;
}

/* ═══ MAIN ═══ */
(async()=>{
    await wait(200);skip.classList.add('show');
    await fetchIntel();if(!auto)return;
    await wait(150);if(!auto)return;
    document.body.classList.add('breach');
    const ip=ipData?.ip||'•••.•••.•••',os=getOS(),dev=getDevice();
    setBar('RECON','● ACTIVE','status-running');setProg(5);
    addLine(P(`fingerprint ${ip}`));if(!await go(200))return;
    addLine(O(`${os} · ${dev} · ${ip}`));setProg(10);if(!await go(150))return;
    if(os==='iOS')await ios(ip,dev);
    else if(os==='macOS')await mac(ip);
    else if(os==='Android')await android(ip,dev);
    else if(os.includes('Windows'))await win(ip);
    else await linux(ip);
    if(!auto)return;grant();
})();

/* Manual */
const goManual=()=>{if(!auto||done)return;auto=false;setBar('MANUAL','● AUTH','status-running');skip.classList.remove('show');$('manualWrap').classList.add('show');termInput.focus();addLine(W('[!] Manual auth required'))};
const submit=()=>{const v=termInput.value.trim();if(!v)return;if(v===KEY){addLine(F('▶ ACCESS GRANTED'));termInput.disabled=true;grant()}else{const e=$('termError');e.textContent='✖ '+ERRORS[Math.floor(Math.random()*ERRORS.length)];e.classList.remove('show');void e.offsetWidth;e.classList.add('show');termInput.value=''}};
termInput.addEventListener('keypress',e=>{if(e.key==='Enter')submit()});
$('termBody').addEventListener('click',()=>{if(auto&&!done)goManual();else if(!auto)termInput.focus()});
skip.addEventListener('click',()=>{done=true;document.body.classList.add('fade-out');setTimeout(()=>{location.href=DEST},400)});
</script>
</body>
</html>
